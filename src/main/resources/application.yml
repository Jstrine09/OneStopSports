spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/matchday
    username: postgres
    password: your_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  cache:
    type: redis
    redis:
      time-to-live: 30s

external-api:
  football-data:
    base-url: https://api.football-data.org/v4
    api-key: YOUR_API_KEY_HERE

jwt:
  secret: bXlzdXBlcnNlY3JldGtleWZvcmptYXRjaGRheWFwcGxpY2F0aW9u
  expiration-ms: 86400000

server:
  port: 8080
