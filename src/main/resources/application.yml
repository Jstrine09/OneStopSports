spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/onestopsports
    username: postgres
    password: your_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
  cache:
    type: redis
    redis:
      time-to-live: 30s

external-api:
  football-data:
    base-url: https://api.football-data.org/v4
    api-key: YOUR_API_KEY_HERE  # override in application-local.yml
  nba:
    base-url: https://api.balldontlie.io/v1
    api-key: YOUR_NBA_KEY_HERE  # override in application-local.yml — get your free key at balldontlie.io
  nfl:
    # ESPN's unofficial public API — no API key required.
    # This is an undocumented but widely-used endpoint. It's stable but not officially supported.
    base-url: https://site.api.espn.com/apis/site/v2/sports/football/nfl

jwt:
  secret: bXlzdXBlcnNlY3JldGtleWZvcmptYXRjaGRheWFwcGxpY2F0aW9u
  expiration-ms: 86400000

server:
  port: 8080

# Swagger UI is served at http://localhost:8080/swagger-ui/index.html
# The raw OpenAPI JSON spec is at http://localhost:8080/v3/api-docs
springdoc:
  swagger-ui:
    path: /swagger-ui.html          # /swagger-ui.html redirects to /swagger-ui/index.html
    operations-sorter: alpha        # Sort endpoints alphabetically so they're easy to scan
    tags-sorter: alpha              # Sort controller groups alphabetically too
  api-docs:
    path: /v3/api-docs              # Where the raw JSON spec lives (used by external tools like Postman)
