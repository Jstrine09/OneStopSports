services:

  postgres:
    image: postgres:16-alpine
    container_name: onestopsports-postgres
    environment:
      POSTGRES_DB: onestopsports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - onestopsports_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: onestopsports-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .                            # Uses the Dockerfile in the project root
    container_name: onestopsports-app
    ports:
      - "8080:8080"
    environment:
      # Activate the docker Spring profile — loads application-docker.yml which
      # points datasource to the "postgres" service and Redis to the "redis" service
      SPRING_PROFILES_ACTIVE: docker
      # Secrets injected from the .env file at the project root (gitignored)
      DB_PASSWORD: ${DB_PASSWORD:-password}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      # Wait for both postgres and redis to pass their healthchecks before starting
      # the app — avoids "connection refused" errors during startup
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure  # Restart if the app crashes (e.g. DB not ready despite healthcheck)

volumes:
  onestopsports_postgres_data:
